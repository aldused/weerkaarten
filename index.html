<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weerkaarten – Ed Aldus Weer en Media</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
  h1 { color: #003366; font-size: 1.4em; margin-bottom: 4px; }
  p  { color: #555; font-size: 0.9em; margin-top: 0; }
  .kaarten { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
  .kaarten img { width: 100%; max-width: 420px; border-radius: 6px;
                 box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
</style>
</head>
<body>
<h1>Ed Aldus Weer en Media – Weerkaarten</h1>
<p>Maximumtemperatuur · Neerslag · Wind · Bewolking | Bron: DWD MOSMIX</p>
<div class="kaarten" id="kaarten"></div>
<script>
const kaarten = [
  "kaart_donderdag_05mar2026.png",
  "kaart_vrijdag_06mar2026.png",
  "kaart_zaterdag_07mar2026.png",
  "kaart_zondag_08mar2026.png",
  "kaart_maandag_09mar2026.png",
  "kaart_dinsdag_10mar2026.png",
  "kaart_woensdag_11mar2026.png",
  "kaart_donderdag_12mar2026.png",
  "kaart_vrijdag_13mar2026.png",
  "kaart_zaterdag_14mar2026.png"
];
const div = document.getElementById("kaarten");
kaarten.forEach(naam => {
  const img = document.createElement("img");
  img.src = naam;
  img.alt = naam;
  img.onerror = function(){ this.style.display='none'; };
  div.appendChild(img);
});
</script>
</body>
</html>
