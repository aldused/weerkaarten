<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weerkaarten – Ed Aldus WM</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 0; }
  .header { background: #00205b; padding: 14px 24px 10px; }
  .header-titel { color: white; font-size: 1.3em; font-weight: bold; letter-spacing: 0.04em; margin: 0; }
  .header-sub { color: #a8c4e8; font-size: 0.82em; margin: 3px 0 0; letter-spacing: 0.02em; }
  .content { padding: 16px 20px; }
  .waarschuwing { padding: 8px 20px; font-size: 0.85em; font-weight: bold;
                  display: none; border-bottom: 2px solid rgba(0,0,0,0.15); }
  .waarschuwing.geel  { background: #f5c400; color: #333; display: block; }
  .waarschuwing.oranje { background: #e07000; color: white; display: block; }
  .waarschuwing.rood  { background: #cc0000; color: white; display: block; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
  .btn { background: #003366; color: white; border: none; padding: 8px 16px;
         border-radius: 5px; cursor: pointer; font-size: 0.85em; }
  .btn:hover { background: #0055aa; }
  .btn.groen { background: #2a7a2a; }
  .btn.groen:hover { background: #3a9a3a; }
  .kaarten { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 10px; }
  .kaart-item { background: white; border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.12);
                overflow: hidden; width: 100%; max-width: 420px; }
  .kaart-item img { width: 100%; display: block; }
  .kaart-footer { padding: 8px 10px; display: flex; justify-content: space-between;
                  align-items: center; background: #f8f9fa;
                  border-top: 1px solid #e0e0e0; }
  .kaart-naam { font-size: 0.78em; color: #444; }
  .btn-down { background: #003366; color: white; border: none; padding: 5px 12px;
              border-radius: 4px; cursor: pointer; font-size: 0.78em;
              text-decoration: none; }
  .btn-down:hover { background: #0055aa; }
  .kaart-item img { cursor: zoom-in; }
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
              z-index: 1000; justify-content: center; align-items: center; }
  #lightbox.actief { display: flex; }
  #lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 6px;
                  box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
  #lightbox-sluit { position: fixed; top: 16px; right: 22px; font-size: 2.2em;
                    color: white; cursor: pointer; line-height: 1; user-select: none; }
  #lightbox-sluit:hover { color: #ccc; }
</style>
</head>
<body>
<div class="header">
  <p class="header-titel">Ed Aldus WM – Weerkaarten</p>
  <p class="header-sub">Maximumtemperatuur · Neerslag · Wind · Bewolking &nbsp;|&nbsp; Bron: DWD MOSMIX</p>
</div>
<div class="waarschuwing" id="waarschuwing-balk"></div>
<div class="content">
<div class="toolbar">
  <button class="btn groen" onclick="downloadAlles()">⬇ Download alle kaarten</button>
  <span style="font-size:0.8em;color:#777;">of download per kaart hieronder</span>
</div>
<div class="kaarten" id="kaarten"></div>
<div id="lightbox" onclick="sluitLightbox()">
  <span id="lightbox-sluit">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>
<script>
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("actief");
}
function sluitLightbox() {
  document.getElementById("lightbox").classList.remove("actief");
}
document.addEventListener("keydown", e => { if(e.key === "Escape") sluitLightbox(); });

fetch("waarschuwing.json")
  .then(r => r.json())
  .then(w => {
    if (w.code && w.code !== "groen") {
      const balk = document.getElementById("waarschuwing-balk");
      balk.className = "waarschuwing " + w.code;
      balk.textContent = "⚠ KNMI waarschuwing: " + w.tekst;
    }
  }).catch(() => {});

fetch("index.json")
  .then(r => r.json())
  .then(kaarten => {
    const div = document.getElementById("kaarten");
    kaarten.forEach(naam => {
      const dagNaam = naam.replace("kaart_","").replace(".png","").replace(/_/g," ");
      const item = document.createElement("div");
      item.className = "kaart-item";
      const img = document.createElement("img");
      img.src = naam; img.alt = dagNaam;
      img.onclick = function(){ openLightbox(naam); };
      img.onerror = function(){ item.style.display="none"; };
      const footer = document.createElement("div");
      footer.className = "kaart-footer";
      const label = document.createElement("span");
      label.className = "kaart-naam"; label.textContent = dagNaam;
      const hint = document.createElement("span");
      hint.style.cssText = "font-size:0.72em;color:#666;background:#f0f4f8;padding:4px 10px;display:block;text-align:right;border-bottom:1px solid #e0e0e0;";
      hint.textContent = "🔍 klik voor vergroting";
      const btn = document.createElement("a");
      btn.className = "btn-down"; btn.href = naam;
      btn.download = naam; btn.textContent = "⬇ Download";
      footer.appendChild(label); footer.appendChild(btn);
      item.appendChild(hint); item.appendChild(img); item.appendChild(footer);
      div.appendChild(item);
    });
  })
  .catch(() => {
    document.getElementById("kaarten").innerHTML =
      "<p style='color:red'>Kon kaartlijst niet laden.</p>";
  });

async function downloadAlles() {
  try {
    const kaarten = await fetch("index.json").then(r => r.json());
    for (const naam of kaarten) {
      const a = document.createElement("a");
      a.href = naam; a.download = naam;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      await new Promise(res => setTimeout(res, 400));
    }
  } catch(e) { alert("Kon kaartlijst niet laden."); }
}
</script>
</div>
</body>
</html>
